<!DOCTYPE html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if IE 7]>         <html class="no-js lt-ie9 lt-ie8"> <![endif]-->
<!--[if IE 8]>         <html class="no-js lt-ie9"> <![endif]-->
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>我的日常记录</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="api-config.js"></script>
</head>

<body>
  <div id="app">
    <div class="container">
      <h1>我的日常记录</h1>

      <form class="entry-form" novalidate>
        <textarea v-model="newEntry" placeholder="写下今天的经历和感受..."></textarea>
        <button @click="addEntry()" type="button">添加记录</button>
      </form>

      <div class="entries" v-for="entry in entries" :key="entry.id">
        <div class="entry-date">{{ entry.date }}</div>
        <div class="entry-content">{{ entry.content }}</div>
      </div>

      <h2>我的博客</h2>

      <form class="blog-form" novalidate>
        <input v-model="newBlog.title" placeholder="博客标题">
        <textarea v-model="newBlog.content" placeholder="写下你的博客内容..."></textarea>
        <button @click="addBlogPost()" type="button">发布博客</button>
      </form>

      <div class="blog-entries" v-for="post in blogPosts" :key="post.id">
        <div class="blog-header">
          <h3>{{ post.title }}</h3>
          <div class="blog-date">{{ post.date }}</div>
        </div>
        <div class="blog-content">{{ post.content }}</div>
      </div>
    </div>
  </div>

  <script src="vue-app.js"></script>
</body>
</html>
